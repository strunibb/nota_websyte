<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Гитарный тренажёр аккордов | Струны будущего</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#2c3e50; --bg2:#14161a;
      --glass: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.15);
      --accent:#9c27b0;
      --accent2:#3f51b5;
      --good:#3bcf88;
      --bad:#e74c3c;
      --gold:#ffd700;
      --txt:#fff;
      --rad:22px;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Montserrat,system-ui,-apple-system,Arial,sans-serif;color:var(--txt);background:radial-gradient(1200px 1200px at 50% -10%, var(--bg1), var(--bg2));}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}

    /* Welcome */
    .welcome-screen{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.86);z-index:10;animation:fadeIn .6s ease}
    .welcome-content{max-width:820px;text-align:center;padding:28px;background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
    .welcome-content h1{margin:0 0 10px;font-size:clamp(26px,4.6vw,40px);font-weight:800;
      background:linear-gradient(45deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .welcome-content p{opacity:.9;margin:0 0 16px;font-size:clamp(16px,2.6vw,18px)}
    .primary-btn{padding:14px 26px;border:0;border-radius:16px;background:linear-gradient(45deg,#3498db,#2ecc71);color:#fff;font-weight:800;letter-spacing:.3px;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.25);transition:.18s}
    .primary-btn:hover{transform:translateY(-2px)}

    /* Main container */
    .container{width:min(1280px,96vw);margin:24px auto;padding:24px;border-radius:var(--rad);background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(18px);box-shadow:var(--shadow);display:none;opacity:0;animation:rise .7s cubic-bezier(.22,1,.36,1) forwards}
    @keyframes rise{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* Controls */
    .controls{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:18px}
    button.ctrl{padding:12px 18px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(45deg,#3498db,#2ecc71);color:#fff;cursor:pointer;font-weight:800;letter-spacing:.2px;transition:.2s;box-shadow:0 6px 16px rgba(0,0,0,.25)}
    button.ctrl.alt{background:transparent;border-color:var(--line)}
    button.ctrl:hover{transform:translateY(-2px)}
    .group{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}
    .select{appearance:none;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:#fff;font-weight:700}

    /* Header/Note (now “Chord”) display */
    .note-display{font-size:clamp(24px,4vw,34px);text-align:center;margin:10px 0 18px;font-weight:800;color:#fff}
    .subtle{opacity:.9;font-weight:700}
    #timer{font-weight:800;margin-left:10px}

    /* Fretboard */
    .guitar-fretboard{display:flex;flex-direction:column;gap:10px;padding:18px;border-radius:18px;position:relative;background:linear-gradient(135deg,#3a1c71,#89216b,#da4453);border:2px solid rgba(255,255,255,.18);box-shadow:inset 0 4px 20px rgba(0,0,0,.35),0 14px 40px rgba(0,0,0,.45)}
    .guitar-fretboard.no-clicks .fret{pointer-events:none;opacity:.92}
    .string{display:flex;align-items:center;gap:10px;position:relative}
    .string::after{content:"";position:absolute;left:0;right:0;height:5px;background:linear-gradient(to right,rgba(255,255,255,.9),rgba(210,210,210,.9));z-index:0}

    .fret{position:relative;z-index:1;width:74px;height:64px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.18);display:grid;place-items:center;font-weight:800;font-size:18px;color:#fff;cursor:pointer;transition:.18s}
    .fret:hover{transform:translateY(-2px) rotate(1deg);box-shadow:0 10px 22px rgba(0,0,0,.35)}
    .fret.note{background:rgba(255,255,255,.12)}
    .fret::before{content:"";position:absolute;left:-7px;width:4px;height:34px;background:rgba(255,255,255,.55);border-radius:2px}

    .correct{background:var(--good)!important;border-color:#27ae60!important;box-shadow:0 0 18px rgba(59,207,136,.55);animation:correctAnim .8s ease}
    .incorrect{background:var(--bad)!important;border-color:#c0392b!important;animation:shake .35s ease}

    @keyframes correctAnim{0%{transform:scale(1)}50%{transform:scale(1.14) rotate(8deg)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-8px)}}

    .message{text-align:center;margin-top:12px;font-weight:700}
    .badge{display:inline-block;margin-left:10px;padding:4px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(0,0,0,.28);font-size:14px}

    /* Particles */
    .note-particle{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;animation:particle 1s ease-out forwards;pointer-events:none}
    @keyframes particle{to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

    /* Responsive */
    @media (max-width:900px){
      .fret{width:60px;height:56px;font-size:16px}
      .guitar-fretboard{padding:12px;gap:8px}
    }
    @media (max-width:640px){
      .fret{width:52px;height:50px;font-size:15px}
    }
  </style>
</head>
<body>

  <!-- Welcome -->
  <div class="welcome-screen">
    <div class="welcome-content">
      <h1>🎸 Добро пожаловать в гитарный тренажёр</h1>
      <p>Освой аккорды на 6-й и 5-й струнах. Случайные задания, таймер, эффектный фидбэк — и быстрый прогресс.</p>
      <button class="primary-btn" onclick="startApp()">Начать</button>
    </div>
  </div>

  <!-- App -->
  <div class="container">
    <div class="controls">
      <div class="group">
        <button class="ctrl alt" onclick="showNotes()">Показать ноты</button>
        <button class="ctrl alt" onclick="startNoteTraining([6,5])">Ноты: 6/5</button>

        <button class="ctrl" onclick="startChordTraining(false)">Аккорды 6/5 (без таймера)</button>

        <select id="intervalSelect" class="select" title="Интервал для таймера">
          <option value="random">Случайно 10/8/6/4/2</option>
          <option value="10">10 секунд</option>
          <option value="8">8 секунд</option>
          <option value="6">6 секунд</option>
          <option value="4">4 секунды</option>
          <option value="2">2 секунды</option>
        </select>
        <button class="ctrl" onclick="startChordTraining(true)">Аккорды 6/5 (таймер)</button>
      </div>
    </div>

    <div class="note-display">
      <span id="noteDisplay">🎵 <span class="subtle">Найдите все аккорды:</span></span>
      <span id="timer" class="badge" style="display:none;">⏱ 10с</span>
    </div>

    <div class="guitar-fretboard" id="guitarFretboard">
      <div class="string" id="string1"></div>
      <div class="string" id="string2"></div>
      <div class="string" id="string3"></div>
      <div class="string" id="string4"></div>
      <div class="string" id="string5"></div>
      <div class="string" id="string6"></div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    // ===== Data (10 ладов) =====
    const notes = {
      6: ['F','F#','G','G#','A','A#','B','C','C#','D'],
      5: ['A#','B','C','C#','D','D#','E','F','F#','G'],
      4: ['D#','E','F','F#','G','G#','A','A#','B','C'],
      3: ['G#','A','A#','B','C','C#','D','D#','E','F'],
      2: ['C','C#','D','D#','E','F','F#','G','G#','A'],
      1: ['F','F#','G','G#','A','A#','B','C','C#','D']
    };

    // ===== State =====
    let mode = 'idle'; // 'notes' | 'chords' | 'idle'
    let visibleStrings = [6,5,4,3,2,1];

    // Notes training (no repeats)
    let noteQueue = [];  // массив уникальных нот
    let currentNote = null;

    // Chord training
    const ROOTS = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
    const QUALITIES = ['', 'm']; // ''=major, 'm'=minor
    let chordQueue = []; // {root, quality, targetString}
    let currentTask = null;
    let timed = false;
    let countdownId = null;
    let hardTimeoutId = null;
    const TIMER_CHOICES = [10,8,6,4,2];

    // UI refs
    const container = document.querySelector('.container');
    const welcome = document.querySelector('.welcome-screen');
    const noteDisplayEl = document.getElementById('noteDisplay');
    const messageEl = document.getElementById('message');
    const timerBadge = document.getElementById('timer');
    const fretboardEl = document.getElementById('guitarFretboard');
    const intervalSelect = document.getElementById('intervalSelect');

    // ===== App init =====
    function startApp(){
      welcome.style.display='none';
      container.style.display='block';
      requestAnimationFrame(()=> container.style.opacity=1);
      setVisibleStrings([6,5,4,3,2,1]);
      createFretboard(false);
      addBackgroundParticles();
      showPrompt('🎵 <span class="subtle">Найдите все аккорды:</span>');
    }

    // ===== Fretboard =====
    function setVisibleStrings(arr){
      visibleStrings = arr.slice().sort((a,b)=>b-a); // сверху — 6-я
      for(let s=1; s<=6; s++){
        const el = document.getElementById(`string${s}`);
        el.style.display = visibleStrings.includes(s) ? 'flex' : 'none';
      }
    }

    function createFretboard(showNoteNames=false){
      for(let s=6; s>=1; s--){
        const row = document.getElementById(`string${s}`);
        row.innerHTML='';
        for(let f=0; f<10; f++){
          const d = document.createElement('div');
          d.className = 'fret' + (showNoteNames ? ' note':'');

          d.textContent = showNoteNames ? notes[s][f] : (f+1);

          d.addEventListener('click', ()=>{
            if(fretboardEl.classList.contains('no-clicks')) return; // клики отключены
            if(mode==='notes') onClickNote(s,f);
            else if(mode==='chords') onClickChord(s,f);
          });

          row.appendChild(d);
        }
      }
    }

    // ===== Notes training (без повторов) =====
    function showNotes(){
      stopAllTimers();
      mode='idle';
      setVisibleStrings([6,5,4,3,2,1]);
      createFretboard(true);
      fretboardEl.classList.remove('no-clicks');
      messageEl.textContent='';
      showPrompt('🎸 Изучите ноты на грифе');
    }

    function startNoteTraining(strings){
      stopAllTimers();
      mode = 'notes';
      setVisibleStrings(strings);
      createFretboard(false);
      fretboardEl.classList.remove('no-clicks');
      messageEl.textContent='';

      // Собираем очередь уникальных нот и тасуем
      const poolSet = new Set();
      strings.forEach(s => notes[s].forEach(n => poolSet.add(n)));
      noteQueue = shuffle([...poolSet]);

      nextNote();
    }

    function nextNote(){
      if(noteQueue.length === 0){
        showPrompt('🎉 Тренировка завершена!');
        messageEl.textContent='Все ноты пройдены без повторов.';
        return;
      }
      currentNote = noteQueue.shift();
      showPrompt(`🎵 <span class="subtle">Найдите все ноты:</span> ${currentNote}`);
    }

    function onClickNote(s,f){
      if(notes[s][f] === currentNote){
        const cell = document.getElementById(`string${s}`).children[f];
        cell.classList.add('correct');
        cell.textContent = currentNote;
        burst(cell);

        // проверяем: найдены ли все позиции этой ноты на видимых струнах
        const allCells = visibleStrings.flatMap(ss =>
          notes[ss].map((n,idx)=>({ss,idx,n}))
        ).filter(x=>x.n===currentNote);

        const foundAll = allCells.every(({ss,idx})=>{
          const c = document.getElementById(`string${ss}`).children[idx];
          return c.classList.contains('correct');
        });

        if(foundAll){
          messageEl.textContent='✅ Все позиции найдены! Следующая нота...';
          setTimeout(nextNote, 800);
        }
      }else{
        const cell = document.getElementById(`string${s}`).children[f];
        blinkWrong(cell);
      }
    }

    // ===== Chord training =====
    function startChordTraining(useTimer){
      stopAllTimers();
      mode='chords';
      setVisibleStrings([6,5]);
      createFretboard(false);
      messageEl.textContent='';

      // очередь из всех 24 аккордов (перемешано), для каждого выбираем струну 6/5, где есть корень в пределах 10 ладов
      chordQueue = buildChordQueue();
      shuffle(chordQueue);

      timed = !!useTimer;
      timerBadge.style.display = timed ? 'inline-block' : 'none';

      // клики отключены в таймере
      fretboardEl.classList.toggle('no-clicks', timed);

      nextChordTask();
    }

    function buildChordQueue(){
      const tasks = [];
      const avail6 = new Set(notes[6]);
      const avail5 = new Set(notes[5]);
      ROOTS.forEach(root=>{
        QUALITIES.forEach(q=>{
          const can6 = avail6.has(root);
          const can5 = avail5.has(root);
          if(!can6 && !can5) return;
          const targetString = (can6 && can5) ? (Math.random()<0.5?6:5) : (can6?6:5);
          tasks.push({root, quality:q, targetString});
        });
      });
      return tasks;
    }

    function nextChordTask(){
      stopPerTaskTimers();
      clearMarks();

      if(chordQueue.length===0){
        showPrompt('🎉 Все аккорды пройдены!');
        messageEl.textContent='Отличная работа!';
        return;
      }
      currentTask = chordQueue.shift();
      const label = `${currentTask.root}${currentTask.quality}`;
      showPrompt(`🎵 <span class="subtle">Найдите все аккорды:</span> ${label} — <span class="badge">на ${currentTask.targetString}-й струне</span>`);

      if(timed){
        const interval = pickInterval(); // число секунд
        runCountdown(interval, ()=> {
          // просто переключаемся дальше — никаких кликов не требуется
          nextChordTask();
        });
      }
    }

    // клики в режиме «без таймера»: отмечаем правильные позиции на целевой струне
    function onClickChord(s,f){
      if(!currentTask) return;
      if(s !== currentTask.targetString){
        blinkWrong(document.getElementById(`string${s}`).children[f]);
        return;
      }
      if(notes[s][f] === currentTask.root){
        const cell = document.getElementById(`string${s}`).children[f];
        if(!cell.classList.contains('correct')){
          cell.classList.add('correct');
          cell.textContent = `${currentTask.root}${currentTask.quality}`;
          burst(cell);

          // проверяем все позиции корня на этой струне
          const pos = notes[s].map((n,idx)=>({n,idx})).filter(x=>x.n===currentTask.root);
          const done = pos.every(({idx})=>{
            const c = document.getElementById(`string${s}`).children[idx];
            return c.classList.contains('correct');
          });
          if(done){
            messageEl.textContent='✅ Все позиции найдены!';
            setTimeout(nextChordTask, 600);
          }
        }
      }else{
        blinkWrong(document.getElementById(`string${s}`).children[f]);
      }
    }

    // ===== Timer helpers =====
    function pickInterval(){
      const val = intervalSelect.value;
      if(val === 'random'){
        return TIMER_CHOICES[Math.floor(Math.random()*TIMER_CHOICES.length)];
      }
      return Number(val);
    }

    function runCountdown(seconds, onEnd){
      let remaining = seconds;
      timerBadge.textContent = `⏱ ${remaining}с`;

      countdownId = setInterval(()=>{
        remaining--;
        if(remaining<=0){
          timerBadge.textContent = '⏱ 0с';
          stopPerTaskTimers();
          onEnd && onEnd();
        }else{
          timerBadge.textContent = `⏱ ${remaining}с`;
        }
      },1000);

      // жесткий стоп на случай лагов
      hardTimeoutId = setTimeout(()=>{
        stopPerTaskTimers();
        onEnd && onEnd();
      }, (seconds*1000)+120);
    }

    function stopPerTaskTimers(){
      if(countdownId){ clearInterval(countdownId); countdownId=null; }
      if(hardTimeoutId){ clearTimeout(hardTimeoutId); hardTimeoutId=null; }
    }
    function stopAllTimers(){
      stopPerTaskTimers();
      timerBadge.style.display='none';
    }

    // ===== UI helpers =====
    function clearMarks(){
      // очистить подсветки/подписи
      for(let s=6;s>=1;s--){
        const row = document.getElementById(`string${s}`);
        [...row.children].forEach((cell,idx)=>{
          cell.classList.remove('correct','incorrect');
          cell.textContent = idx+1;
        });
      }
    }

    function showPrompt(html){ noteDisplayEl.innerHTML = html; }
    function blinkWrong(cell){ cell.classList.add('incorrect'); setTimeout(()=> cell.classList.remove('incorrect'), 420); }
    function burst(el){
      const r = el.getBoundingClientRect();
      for(let i=0;i<12;i++){
        const p = document.createElement('div');
        p.className='note-particle';
        p.style.left = (r.left + r.width/2) + 'px';
        p.style.top  = (r.top + r.height/2) + 'px';
        p.style.setProperty('--tx', `${(Math.random()*120-60)}px`);
        p.style.setProperty('--ty', `${(Math.random()*120-60)}px`);
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1000);
      }
    }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function addBackgroundParticles(){
      for(let i=0;i<40;i++){
        const s = document.createElement('span');
        const size = Math.random()*4+2;
        s.style.position='fixed';
        s.style.left = (Math.random()*100)+'vw';
        s.style.top  = (Math.random()*100)+'vh';
        s.style.width = size+'px';
        s.style.height = size+'px';
        s.style.borderRadius='50%';
        s.style.background = `rgba(255,255,255,${Math.random()*0.35})`;
        s.style.pointerEvents='none';
        s.style.zIndex='-1';
        document.body.appendChild(s);
      }
    }
  </script>
</body>
</html>
